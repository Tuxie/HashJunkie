name: Build Native Addons

on:
  push:
    branches: [main]
  workflow_dispatch:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            node-file: hashjunkie.linux-x64-gnu.node
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            node-file: hashjunkie.linux-arm64-gnu.node
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-13
            node-file: hashjunkie.darwin-x64.node
          - target: aarch64-apple-darwin
            runner: macos-latest
            node-file: hashjunkie.darwin-arm64.node
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            node-file: hashjunkie.win32-x64-msvc.node

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cross (Linux arm64 only)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: "!matrix.cross"
        run: >
          cargo build
          -p hashjunkie-napi
          --release
          --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: >
          cross build
          -p hashjunkie-napi
          --release
          --target ${{ matrix.target }}

      - name: Rename .node artifact (Linux)
        if: runner.os == 'Linux'
        run: >
          cp target/${{ matrix.target }}/release/libhashjunkie_napi.so
          ${{ matrix.node-file }}

      - name: Rename .node artifact (macOS)
        if: runner.os == 'macOS'
        run: >
          cp target/${{ matrix.target }}/release/libhashjunkie_napi.dylib
          ${{ matrix.node-file }}

      - name: Rename .node artifact (Windows)
        if: runner.os == 'Windows'
        run: >
          Copy-Item
          target/${{ matrix.target }}/release/hashjunkie_napi.dll
          ${{ matrix.node-file }}
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.node-file }}
          path: ${{ matrix.node-file }}
          retention-days: 7
