name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  # Main pushes must run one-at-a-time so version discovery cannot race with a
  # concurrent publish and reserve the same npm version twice.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: read

jobs:
  version-consistency:
    name: Version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check version mirrors
        run: node scripts/version-sync.mjs check

      - name: Test version tooling
        run: node --test scripts/version-sync.test.mjs scripts/update-homebrew-formula.test.mjs scripts/release-notes.test.mjs

  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Rust nightly toolchain (for branch coverage)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo +stable fmt --all -- --check

      - name: Clippy (warnings as errors)
        # hashjunkie-napi uses napi-rs macros that generate code incompatible with
        # cfg(test) — exclude it from the workspace clippy run.
        run: >
          cargo +stable clippy
          --workspace
          --exclude hashjunkie-napi
          --all-targets
          -- -D warnings

      - name: Tests
        run: >
          cargo +stable test
          --workspace
          --exclude hashjunkie-napi

      - name: CID profiling binary compiles
        run: >
          cargo +stable check
          -p hashjunkie-core
          --features profile-ipfs-cid
          --bin hashjunkie-cid-profile

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Coverage (100% gate on hashjunkie-core)
        run: >
          cargo +nightly llvm-cov
          -p hashjunkie-core
          --branch
          --fail-under-lines 100

  typescript:
    name: TypeScript checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: npm/hashjunkie
    steps:
      - uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Biome lint + format check
        run: ./node_modules/.bin/biome ci .

      - name: Tests with coverage (100% gate)
        # Parse bun's coverage table and fail if any file is below 100%.
        # hashjunkie_wasm.js is generated by wasm-bindgen and excluded: its dead
        # code paths (async init, error throws) cannot be reached in normal
        # operation and bun 1.3.12 has no coverage-ignore-file support. The
        # "All files" aggregate row is also excluded — it reflects the generated
        # file's drag and is not a per-file coverage measurement.
        run: |
          bun test --coverage 2>&1 | tee /tmp/coverage.txt
          if grep -E "[[:space:]]+[0-9]{1,2}\.[0-9]{2}[[:space:]]" /tmp/coverage.txt \
            | grep -v "hashjunkie_wasm\.js" \
            | grep -v "^All files"; then
            echo "Coverage below 100% in one or more files."
            exit 1
          fi

  wasm-fresh-build:
    name: WASM fresh build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version 0.2.120

      - name: Build and embed fresh WASM
        run: ./scripts/build-wasm.sh

      - name: Install npm dependencies
        working-directory: npm/hashjunkie
        run: bun install

      # Behavioural gate: the freshly-built blob must pass the full test suite.
      # We do not diff against the committed blob — wasm-bindgen / rustc updates
      # routinely shift bytes without changing behaviour, and a byte gate turns
      # every toolchain bump into a spurious failure.
      - name: Test freshly-built WASM blob
        working-directory: npm/hashjunkie
        run: bun test

      - name: Upload fresh WASM artifact
        uses: actions/upload-artifact@v7
        with:
          name: hashjunkie-wasm-blob
          path: |
            npm/hashjunkie/hashjunkie_wasm.js
            npm/hashjunkie/hashjunkie_wasm.d.ts
            npm/hashjunkie/wasm_blob.ts
          retention-days: 7

  version:
    name: Determine release version
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.release.outputs.release }}
      new: ${{ steps.version.outputs.new }}
      skip: ${{ steps.version.outputs.skip }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect release-relevant changes
        id: release
        run: |
          changed=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$changed"
          # Paths that ship in a build artifact:
          #   CHANGELOG.md — GitHub Release notes
          #   crates/hashjunkie-cli/Cargo.toml  — CLI manifest changes affect release assets
          #   crates/*/src/          — Rust source for all crates, including CLI source
          #   crates/hashjunkie-napi/build.rs — napi build script
          #   npm/hashjunkie/*.ts/js  — TS/JS source (test files excluded below)
          #   Cargo.toml / Cargo.lock — dependency changes affect compiled output
          #   npm/*/package.json      — manifest changes affect published packages
          #   VERSION / scripts/*.mjs — release version, release notes, and release gates
          #   .github/workflows/ci.yml — release gating and packaging metadata
          release_files=$(echo "$changed" \
            | grep -E '^(CHANGELOG\.md|VERSION|scripts/(release-notes|version-sync)\.mjs|crates/hashjunkie-cli/Cargo\.toml|crates/[^/]+/src/|crates/hashjunkie-napi/build\.rs|Cargo\.(toml|lock)|npm/hashjunkie/[^/]+\.(ts|js)|npm/[^/]+/package\.json|\.github/workflows/ci\.yml)' \
            | grep -vE '\.test\.ts$')
          if [ -n "$release_files" ]; then
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "Release-relevant changes detected:"
            echo "$release_files"
          else
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "No release-relevant changes — skipping build and publish."
          fi

      # Read the concrete version once from VERSION so CLI archive names, npm
      # package manifests, Cargo manifests, git tags, and GitHub Release assets
      # stay in lockstep.
      - name: Determine next version
        id: version
        if: steps.release.outputs.release == 'true'
        run: |
          set -euo pipefail
          node scripts/version-sync.mjs check
          NEW=$(node scripts/version-sync.mjs print)
          LATEST=$(npm view @perw/hashjunkie version 2>/dev/null || echo "0.0.0")
          if [ "$NEW" = "$LATEST" ]; then
            SKIP=true
          else
            SKIP=false
          fi
          echo "new=$NEW"       >> "$GITHUB_OUTPUT"
          echo "skip=$SKIP"     >> "$GITHUB_OUTPUT"
          echo "npm latest: $LATEST; VERSION: $NEW; publishing: $NEW; skip: $SKIP"

  build-native:
    name: Build ${{ matrix.target }}
    # Only runs on main pushes that touch release-relevant source files.
    # PRs, docs, tests, and unrelated changes skip the expensive native builds.
    needs: [version-consistency, rust, typescript, wasm-fresh-build, version]
    if: needs.version.outputs.release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            node-file: hashjunkie.linux-x64-gnu.node
            cli-platform: linux-x64-gnu
            cli-archive-ext: tar.xz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            node-file: hashjunkie.linux-arm64-gnu.node
            cli-platform: linux-arm64-gnu
            cli-archive-ext: tar.xz
          - target: x86_64-apple-darwin
            runner: macos-latest
            node-file: hashjunkie.darwin-x64.node
            cli-platform: darwin-x64
            cli-archive-ext: tar.xz
          - target: aarch64-apple-darwin
            runner: macos-latest
            node-file: hashjunkie.darwin-arm64.node
            cli-platform: darwin-arm64
            cli-archive-ext: tar.xz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            node-file: hashjunkie.win32-x64-msvc.node
            cli-platform: win32-x64-msvc
            cli-archive-ext: zip
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          # The Windows build has occasionally failed after successful artifact
          # upload while saving the post-job cache. Keep restore benefits, but
          # do not let a best-effort cache save block a release.
          save-if: ${{ runner.os != 'Windows' }}

      - name: Build
        run: >
          cargo build
          -p hashjunkie-napi
          -p hashjunkie-cli
          --release
          --target ${{ matrix.target }}

      - name: Package CLI archive (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          OUT="hashjunkie-cli-${{ needs.version.outputs.new }}-${{ matrix.cli-platform }}.tar.xz"
          mkdir -p /tmp/hashjunkie-cli
          cp target/${{ matrix.target }}/release/hashjunkie /tmp/hashjunkie-cli/hashjunkie
          tar -C /tmp/hashjunkie-cli -cJf "$OUT" hashjunkie
          echo "CLI_ARCHIVE=$OUT" >> "$GITHUB_ENV"

      - name: Package CLI archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $out = "hashjunkie-cli-${{ needs.version.outputs.new }}-${{ matrix.cli-platform }}.zip"
          New-Item -ItemType Directory -Force -Path dist-cli | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\hashjunkie.exe" "dist-cli\hashjunkie.exe"
          Compress-Archive -Path "dist-cli\hashjunkie.exe" -DestinationPath $out -Force
          "CLI_ARCHIVE=$out" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Rename .node artifact (Linux)
        if: runner.os == 'Linux'
        run: >
          cp target/${{ matrix.target }}/release/libhashjunkie_napi.so
          ${{ matrix.node-file }}

      - name: Rename .node artifact (macOS)
        if: runner.os == 'macOS'
        run: >
          cp target/${{ matrix.target }}/release/libhashjunkie_napi.dylib
          ${{ matrix.node-file }}

      - name: Rename .node artifact (Windows)
        if: runner.os == 'Windows'
        run: >
          Copy-Item
          target\${{ matrix.target }}\release\hashjunkie_napi.dll
          ${{ matrix.node-file }}
        shell: pwsh

      - name: Upload native artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.node-file }}
          path: ${{ matrix.node-file }}
          retention-days: 1

      - name: Upload CLI archive artifact
        uses: actions/upload-artifact@v7
        with:
          name: cli-${{ matrix.cli-platform }}
          path: ${{ env.CLI_ARCHIVE }}
          retention-days: 1

  publish:
    name: Publish to npm
    needs: [version, build-native]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.version.outputs.release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the version tag back to the repo
      id-token: write   # needed for npm provenance
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download all native addon artifacts
        if: needs.version.outputs.skip != 'true'
        uses: actions/download-artifact@v8
        with:
          pattern: "hashjunkie.*.node"
          merge-multiple: true
          path: /tmp/native-artifacts

      - name: Download all CLI archive artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: "cli-*"
          merge-multiple: true
          path: /tmp/cli-artifacts

      - name: Prepare npm manifests for publish
        if: needs.version.outputs.skip != 'true'
        run: |
          V="${{ needs.version.outputs.new }}"
          # Replace workspace:* pins in the main package's optionalDependencies
          # with the concrete version being published, otherwise consumers get
          # unresolved "workspace:*" ranges.
          jq --arg v "$V" '.optionalDependencies |= with_entries(.value=$v)' \
            npm/hashjunkie/package.json > /tmp/pkg.json \
            && mv /tmp/pkg.json npm/hashjunkie/package.json

      - name: Place .node files into platform packages
        if: needs.version.outputs.skip != 'true'
        run: |
          cp /tmp/native-artifacts/hashjunkie.linux-x64-gnu.node    npm/hashjunkie-linux-x64-gnu/
          cp /tmp/native-artifacts/hashjunkie.linux-arm64-gnu.node  npm/hashjunkie-linux-arm64-gnu/
          cp /tmp/native-artifacts/hashjunkie.darwin-x64.node       npm/hashjunkie-darwin-x64/
          cp /tmp/native-artifacts/hashjunkie.darwin-arm64.node     npm/hashjunkie-darwin-arm64/
          cp /tmp/native-artifacts/hashjunkie.win32-x64-msvc.node   npm/hashjunkie-win32-x64-msvc/

      - name: Configure npm token
        if: needs.version.outputs.skip != 'true'
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Publish platform packages
        if: needs.version.outputs.skip != 'true'
        run: |
          set -e
          for pkg in \
            npm/hashjunkie-linux-x64-gnu \
            npm/hashjunkie-linux-arm64-gnu \
            npm/hashjunkie-darwin-x64 \
            npm/hashjunkie-darwin-arm64 \
            npm/hashjunkie-win32-x64-msvc; do
            echo "Publishing $pkg..."
            (cd "$pkg" && npm publish --provenance --access public)
          done

      - name: Publish main package
        if: needs.version.outputs.skip != 'true'
        working-directory: npm/hashjunkie
        run: npm publish --provenance --access public

      - name: Tag the release
        run: |
          set -euo pipefail
          TAG="v${{ needs.version.outputs.new }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Git tag $TAG already exists."
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Prepare GitHub Release notes
        run: node scripts/release-notes.mjs "${{ needs.version.outputs.new }}" > /tmp/release-notes.md

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="v${{ needs.version.outputs.new }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TAG" --notes-file /tmp/release-notes.md
          else
            gh release create "$TAG" --verify-tag --title "$TAG" --notes-file /tmp/release-notes.md
          fi

      - name: Upload CLI archives to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "v${{ needs.version.outputs.new }}" \
            /tmp/cli-artifacts/hashjunkie-cli-${{ needs.version.outputs.new }}-* \
            --clobber

      - name: Checkout Homebrew tap
        uses: actions/checkout@v6
        with:
          repository: Tuxie/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update Homebrew formula
        run: |
          set -euo pipefail
          node scripts/update-homebrew-formula.mjs \
            --formula homebrew-tap/Formula/hashjunkie.rb \
            --artifacts-dir /tmp/cli-artifacts \
            --version "${{ needs.version.outputs.new }}"

      - name: Push Homebrew tap update
        working-directory: homebrew-tap
        run: |
          set -euo pipefail
          if git diff --quiet -- Formula/hashjunkie.rb; then
            echo "Homebrew formula already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/hashjunkie.rb
          git commit -m "hashjunkie ${{ needs.version.outputs.new }}"
          git push
