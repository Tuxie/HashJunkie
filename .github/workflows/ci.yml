name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: read

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Rust nightly toolchain (for branch coverage)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo +stable fmt --all -- --check

      - name: Clippy (warnings as errors)
        # hashjunkie-napi uses napi-rs macros that generate code incompatible with
        # cfg(test) — exclude it from the workspace clippy run.
        run: >
          cargo +stable clippy
          --workspace
          --exclude hashjunkie-napi
          --all-targets
          -- -D warnings

      - name: Tests
        run: >
          cargo +stable test
          --workspace
          --exclude hashjunkie-napi

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Coverage (100% gate on hashjunkie-core)
        run: >
          cargo +nightly llvm-cov
          -p hashjunkie-core
          --branch
          --fail-under-lines 100

  typescript:
    name: TypeScript checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: npm/hashjunkie
    steps:
      - uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Biome lint + format check
        run: ./node_modules/.bin/biome ci .

      - name: Tests with coverage (100% gate)
        # Parse bun's coverage table and fail if any file is below 100%.
        # hashjunkie_wasm.js is generated by wasm-bindgen and excluded: its dead
        # code paths (async init, error throws) cannot be reached in normal
        # operation and bun 1.3.12 has no coverage-ignore-file support. The
        # "All files" aggregate row is also excluded — it reflects the generated
        # file's drag and is not a per-file coverage measurement.
        run: |
          bun test --coverage 2>&1 | tee /tmp/coverage.txt
          if grep -E "[[:space:]]+[0-9]{1,2}\.[0-9]{2}[[:space:]]" /tmp/coverage.txt \
            | grep -v "hashjunkie_wasm\.js" \
            | grep -v "^All files"; then
            echo "Coverage below 100% in one or more files."
            exit 1
          fi

  wasm-fresh-build:
    name: WASM fresh build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version 0.2.118

      - name: Build and embed fresh WASM
        run: ./scripts/build-wasm.sh

      - name: Install npm dependencies
        working-directory: npm/hashjunkie
        run: bun install

      # Behavioural gate: the freshly-built blob must pass the full test suite.
      # We do not diff against the committed blob — wasm-bindgen / rustc updates
      # routinely shift bytes without changing behaviour, and a byte gate turns
      # every toolchain bump into a spurious failure.
      - name: Test freshly-built WASM blob
        working-directory: npm/hashjunkie
        run: bun test

      - name: Upload fresh WASM artifact
        uses: actions/upload-artifact@v7
        with:
          name: hashjunkie-wasm-blob
          path: |
            npm/hashjunkie/hashjunkie_wasm.js
            npm/hashjunkie/hashjunkie_wasm.d.ts
            npm/hashjunkie/wasm_blob.ts
          retention-days: 7

  should-release:
    name: Check for release-relevant changes
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.check.outputs.release }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect release-relevant changes
        id: check
        run: |
          changed=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$changed"
          # Paths that ship in a build artifact:
          #   crates/hashjunkie-cli/Cargo.toml  — CLI manifest changes affect release assets
          #   crates/hashjunkie-cli/src/        — CLI source changes affect release assets
          #   crates/*/src/          — Rust source for all crates
          #   crates/hashjunkie-napi/build.rs — napi build script
          #   npm/hashjunkie/*.ts/js  — TS/JS source (test files excluded below)
          #   Cargo.toml / Cargo.lock — dependency changes affect compiled output
          #   npm/*/package.json      — manifest changes affect published packages
          #   .github/workflows/ci.yml — release gating and packaging metadata
          release_files=$(echo "$changed" \
            | grep -E '^(crates/hashjunkie-cli/Cargo\.toml|crates/hashjunkie-cli/src/|crates/[^/]+/src/|crates/hashjunkie-napi/build\.rs|Cargo\.(toml|lock)|npm/hashjunkie/[^/]+\.(ts|js)|npm/[^/]+/package\.json|\.github/workflows/ci\.yml)' \
            | grep -vE '\.test\.ts$')
          if [ -n "$release_files" ]; then
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "Release-relevant changes detected:"
            echo "$release_files"
          else
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "No release-relevant changes — skipping build and publish."
          fi

  build-native:
    name: Build ${{ matrix.target }}
    # Only runs on main pushes that touch release-relevant source files.
    # PRs, docs, tests, and CI-only changes skip the expensive native builds.
    needs: [rust, typescript, wasm-fresh-build, should-release]
    if: needs.should-release.outputs.release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            node-file: hashjunkie.linux-x64-gnu.node
            cli-platform: linux-x64-gnu
            cli-archive-ext: tar.xz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            node-file: hashjunkie.linux-arm64-gnu.node
            cli-platform: linux-arm64-gnu
            cli-archive-ext: tar.xz
          - target: x86_64-apple-darwin
            runner: macos-latest
            node-file: hashjunkie.darwin-x64.node
            cli-platform: darwin-x64
            cli-archive-ext: tar.xz
          - target: aarch64-apple-darwin
            runner: macos-latest
            node-file: hashjunkie.darwin-arm64.node
            cli-platform: darwin-arm64
            cli-archive-ext: tar.xz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            node-file: hashjunkie.win32-x64-msvc.node
            cli-platform: win32-x64-msvc
            cli-archive-ext: zip
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: >
          cargo build
          -p hashjunkie-napi
          --release
          --target ${{ matrix.target }}

      - name: Rename .node artifact (Linux)
        if: runner.os == 'Linux'
        run: >
          cp target/${{ matrix.target }}/release/libhashjunkie_napi.so
          ${{ matrix.node-file }}

      - name: Rename .node artifact (macOS)
        if: runner.os == 'macOS'
        run: >
          cp target/${{ matrix.target }}/release/libhashjunkie_napi.dylib
          ${{ matrix.node-file }}

      - name: Rename .node artifact (Windows)
        if: runner.os == 'Windows'
        run: >
          Copy-Item
          target\${{ matrix.target }}\release\hashjunkie_napi.dll
          ${{ matrix.node-file }}
        shell: pwsh

      - name: Upload native artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.node-file }}
          path: ${{ matrix.node-file }}
          retention-days: 1

  publish:
    name: Publish to npm
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build-native]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the version tag back to the repo
      id-token: write   # needed for npm provenance
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download all native addon artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: "hashjunkie.*.node"
          merge-multiple: true
          path: /tmp/native-artifacts

      # Decide which version to publish. Rules:
      #   - If the latest on npm is 0.2.x, bump patch → 0.2.(x+1).
      #   - Otherwise seed the line at 0.2.0.
      #   - If package.json has been manually bumped higher (e.g. to 0.3.0),
      #     respect that and use it instead. This is the "unless otherwise
      #     specified" escape hatch.
      - name: Determine next version
        id: ver
        run: |
          set -e
          LATEST=$(npm view @perw/hashjunkie version 2>/dev/null || echo "0.0.0")
          case "$LATEST" in
            0.2.*) AUTO=$(echo "$LATEST" | awk -F. '{print $1"."$2"."$3+1}') ;;
            *)     AUTO=0.2.0 ;;
          esac
          MANUAL=$(jq -r .version npm/hashjunkie/package.json)
          NEW=$(printf '%s\n%s\n' "$AUTO" "$MANUAL" | sort -V | tail -1)
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "new=$NEW"       >> "$GITHUB_OUTPUT"
          echo "npm latest: $LATEST; package.json: $MANUAL; publishing: $NEW"

      - name: Skip if already published
        id: check
        run: |
          if [ "${{ steps.ver.outputs.new }}" = "${{ steps.ver.outputs.latest }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.ver.outputs.new }} is already on npm; nothing to publish."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stamp version into every package.json
        if: steps.check.outputs.skip != 'true'
        run: |
          V="${{ steps.ver.outputs.new }}"
          for f in \
            npm/hashjunkie/package.json \
            npm/hashjunkie-linux-x64-gnu/package.json \
            npm/hashjunkie-linux-arm64-gnu/package.json \
            npm/hashjunkie-darwin-x64/package.json \
            npm/hashjunkie-darwin-arm64/package.json \
            npm/hashjunkie-win32-x64-msvc/package.json; do
            jq --arg v "$V" '.version=$v' "$f" > "$f.tmp" && mv "$f.tmp" "$f"
          done
          # Replace workspace:* pins in the main package's optionalDependencies
          # with the concrete version being published, otherwise consumers get
          # unresolved "workspace:*" ranges.
          jq --arg v "$V" '.optionalDependencies |= with_entries(.value=$v)' \
            npm/hashjunkie/package.json > /tmp/pkg.json \
            && mv /tmp/pkg.json npm/hashjunkie/package.json

      - name: Place .node files into platform packages
        if: steps.check.outputs.skip != 'true'
        run: |
          cp /tmp/native-artifacts/hashjunkie.linux-x64-gnu.node    npm/hashjunkie-linux-x64-gnu/
          cp /tmp/native-artifacts/hashjunkie.linux-arm64-gnu.node  npm/hashjunkie-linux-arm64-gnu/
          cp /tmp/native-artifacts/hashjunkie.darwin-x64.node       npm/hashjunkie-darwin-x64/
          cp /tmp/native-artifacts/hashjunkie.darwin-arm64.node     npm/hashjunkie-darwin-arm64/
          cp /tmp/native-artifacts/hashjunkie.win32-x64-msvc.node   npm/hashjunkie-win32-x64-msvc/

      - name: Configure npm token
        if: steps.check.outputs.skip != 'true'
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Publish platform packages
        if: steps.check.outputs.skip != 'true'
        run: |
          set -e
          for pkg in \
            npm/hashjunkie-linux-x64-gnu \
            npm/hashjunkie-linux-arm64-gnu \
            npm/hashjunkie-darwin-x64 \
            npm/hashjunkie-darwin-arm64 \
            npm/hashjunkie-win32-x64-msvc; do
            echo "Publishing $pkg..."
            (cd "$pkg" && npm publish --provenance --access public)
          done

      - name: Publish main package
        if: steps.check.outputs.skip != 'true'
        working-directory: npm/hashjunkie
        run: npm publish --provenance --access public

      - name: Tag the release
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.ver.outputs.new }}"
          git push origin "v${{ steps.ver.outputs.new }}"
