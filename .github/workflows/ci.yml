name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Rust nightly toolchain (for branch coverage)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo +stable fmt --all -- --check

      - name: Clippy (warnings as errors)
        # hashjunkie-napi uses napi-rs macros that generate code incompatible with
        # cfg(test) — exclude it from the workspace clippy run.
        run: >
          cargo +stable clippy
          --workspace
          --exclude hashjunkie-napi
          --all-targets
          -- -D warnings

      - name: Tests
        run: >
          cargo +stable test
          --workspace
          --exclude hashjunkie-napi

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Coverage (100% gate on hashjunkie-core)
        # --branch requires nightly; stable does not support -Z coverage-options=branch.
        # Only hashjunkie-core is held to 100%; the CLI binary has I/O paths that
        # are not meaningfully unit-testable without complicating production code.
        run: >
          cargo +nightly llvm-cov
          -p hashjunkie-core
          --branch
          --fail-under-lines 100

  typescript:
    name: TypeScript checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: npm/hashjunkie
    steps:
      - uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Biome lint + format check
        run: ./node_modules/.bin/biome ci .

      - name: Tests with coverage (100% gate)
        # Parse bun's coverage table and fail if any file is below 100%.
        # hashjunkie_wasm.js is generated by wasm-bindgen and excluded:
        # its dead code paths (async init, error throws) cannot be reached in
        # normal operation and bun 1.3.12 has no coverage-ignore-file support.
        # The "All files" aggregate row is also excluded — it reflects the
        # generated file's drag and is not a per-file coverage measurement.
        run: |
          bun test --coverage 2>&1 | tee /tmp/coverage.txt
          # The regex matches 1-2 digit percentages (0.00–99.99), which are inherently below 100.
          if grep -E "[[:space:]]+[0-9]{1,2}\.[0-9]{2}[[:space:]]" /tmp/coverage.txt \
            | grep -v "hashjunkie_wasm\.js" \
            | grep -v "^All files"; then
            echo "Coverage below 100% in one or more files."
            exit 1
          fi
