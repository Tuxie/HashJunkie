name: Build WASM

on:
  push:
    branches: [main]
  workflow_dispatch:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-wasm:
    name: Build WASM blob
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version 0.2.118

      - name: Install binaryen (wasm-opt)
        run: sudo apt-get install -y binaryen

      - name: Build and embed WASM
        run: ./scripts/build-wasm.sh

      - name: Verify committed blob matches fresh build
        run: |
          git diff --exit-code npm/hashjunkie/wasm_blob.ts \
            npm/hashjunkie/hashjunkie_wasm.js \
            npm/hashjunkie/hashjunkie_wasm.d.ts || \
          (echo "WASM generated files are out of date. Run ./scripts/build-wasm.sh and commit." && exit 1)

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: hashjunkie-wasm-blob
          path: |
            npm/hashjunkie/hashjunkie_wasm.js
            npm/hashjunkie/hashjunkie_wasm.d.ts
            npm/hashjunkie/wasm_blob.ts
          retention-days: 7
