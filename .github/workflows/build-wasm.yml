name: Build WASM

on:
  push:
    branches: [main]
  workflow_dispatch:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-wasm:
    name: Build WASM blob
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install npm dependencies
        working-directory: npm/hashjunkie
        run: bun install

      # Run the JS test suite against the committed WASM blob BEFORE overwriting
      # it with a fresh build. This is the behavioural gate: what ships to npm
      # has to work, regardless of whether a fresh build produces byte-identical
      # output (wasm-bindgen / rustc updates routinely shift bytes without
      # changing behaviour, and a byte-diff gate turns every toolchain bump into
      # a spurious CI failure).
      - name: Test committed WASM blob behaviour
        working-directory: npm/hashjunkie
        run: bun test

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version 0.2.118

      - name: Build and embed WASM (smoke test — fresh build must succeed)
        run: ./scripts/build-wasm.sh

      - name: Test freshly-built WASM blob behaviour
        working-directory: npm/hashjunkie
        run: bun test

      - name: Upload fresh WASM artifact
        uses: actions/upload-artifact@v7
        with:
          name: hashjunkie-wasm-blob
          path: |
            npm/hashjunkie/hashjunkie_wasm.js
            npm/hashjunkie/hashjunkie_wasm.d.ts
            npm/hashjunkie/wasm_blob.ts
          retention-days: 7
