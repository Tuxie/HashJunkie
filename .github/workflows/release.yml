name: Release

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-native:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            node-file: hashjunkie.linux-x64-gnu.node
            pkg-dir: npm/hashjunkie-linux-x64-gnu
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            node-file: hashjunkie.linux-arm64-gnu.node
            pkg-dir: npm/hashjunkie-linux-arm64-gnu
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            node-file: hashjunkie.darwin-x64.node
            pkg-dir: npm/hashjunkie-darwin-x64
          - target: aarch64-apple-darwin
            runner: macos-latest
            node-file: hashjunkie.darwin-arm64.node
            pkg-dir: npm/hashjunkie-darwin-arm64
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            node-file: hashjunkie.win32-x64-msvc.node
            pkg-dir: npm/hashjunkie-win32-x64-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cross (Linux arm64 only)
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (native)
        if: "!matrix.cross"
        run: >
          cargo build
          -p hashjunkie-napi
          --release
          --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: >
          cross build
          -p hashjunkie-napi
          --release
          --target ${{ matrix.target }}

      - name: Rename .node artifact (Linux)
        if: runner.os == 'Linux'
        run: >
          cp target/${{ matrix.target }}/release/libhashjunkie_napi.so
          ${{ matrix.node-file }}

      - name: Rename .node artifact (macOS)
        if: runner.os == 'macOS'
        run: >
          cp target/${{ matrix.target }}/release/libhashjunkie_napi.dylib
          ${{ matrix.node-file }}

      - name: Rename .node artifact (Windows)
        if: runner.os == 'Windows'
        run: >
          Copy-Item
          target\${{ matrix.target }}\release\hashjunkie_napi.dll
          ${{ matrix.node-file }}
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.node-file }}
          path: ${{ matrix.node-file }}
          retention-days: 1

  publish:
    name: Publish to npm
    needs: build-native
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # for npm provenance
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download all native addon artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "hashjunkie.*.node"
          merge-multiple: true
          path: /tmp/native-artifacts

      - name: Place .node files into platform packages
        run: |
          cp /tmp/native-artifacts/hashjunkie.linux-x64-gnu.node   npm/hashjunkie-linux-x64-gnu/
          cp /tmp/native-artifacts/hashjunkie.linux-arm64-gnu.node  npm/hashjunkie-linux-arm64-gnu/
          cp /tmp/native-artifacts/hashjunkie.darwin-x64.node       npm/hashjunkie-darwin-x64/
          cp /tmp/native-artifacts/hashjunkie.darwin-arm64.node     npm/hashjunkie-darwin-arm64/
          cp /tmp/native-artifacts/hashjunkie.win32-x64-msvc.node   npm/hashjunkie-win32-x64-msvc/

      - name: Configure npm token
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Publish platform packages
        run: |
          for pkg in \
            npm/hashjunkie-linux-x64-gnu \
            npm/hashjunkie-linux-arm64-gnu \
            npm/hashjunkie-darwin-x64 \
            npm/hashjunkie-darwin-arm64 \
            npm/hashjunkie-win32-x64-msvc; do
            echo "Publishing $pkg..."
            cd "$pkg"
            npm publish --provenance --access public
            cd -
          done

      - name: Publish main package
        working-directory: npm/hashjunkie
        run: npm publish --provenance --access public
